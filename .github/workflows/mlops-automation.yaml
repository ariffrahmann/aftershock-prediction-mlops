# Alur kerja (4 Stage):
#   Stage 1: Automated Testing    → pytest memverifikasi kode tidak rusak
#   Stage 2: Automated Training   → train.py melatih model dengan data terbaru
#   Stage 3: Model Evaluation     → bandingkan metrik dengan threshold LK-01
#   Stage 4: Auto-Registry Update → jika lolos, daftarkan ke MLflow Staging
#
# Trigger:
#   - push ke branch: main, feat/**, lk**
#   - pull_request ke branch: main
#   - Hanya jika ada perubahan di: src/, config/, tests/, requirements*.txt
#     (tidak perlu jalan kalau cuma README yang berubah)

name: "MLOps CI/CD — Code as a Trigger"

on:
  push:
    branches:
      - main
      - "feat/**"
      - "lk**"
    paths:
      # Trigger hanya jika file-file yang relevan dengan ML berubah.
      - "src/**"
      - "config/**"
      - "tests/**"
      - "requirements*.txt"

  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - "tests/**"

  # menjalankan workflow secara manual dari GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Alasan menjalankan manual"
        required: false
        default: "Manual trigger untuk testing/simulasi"

# Izin yang dibutuhkan workflow
permissions:
  contents: read       # baca kode repository
  actions: read        # baca artifact dari job sebelumnya

# JOB 1: Stage 1 — Automated Testing

jobs:
  stage-1-testing:
    name: "Stage 1 — Automated Testing (pytest)"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout kode dari repository
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Setup Python
      # Menggunakan cache='pip' untuk mempercepat install di run berikutnya
      - name: "🐍 Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-ci.txt"

      # Step 3: Install dependencies CI yang ringan
      - name: "📦 Install CI dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      # Step 4: Jalankan pytest
      - name: "🧪 Run pytest (Automated Testing)"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            -v
        env:
          PYTHONWARNINGS: "ignore::FutureWarning"

      # Step 5: Upload coverage report sebagai artifact
      - name: "📊 Upload coverage report"
        uses: actions/upload-artifact@v4
        if: always()   
        with:
          name: coverage-report
          path: reports/coverage.xml
          retention-days: 7   # simpan 7 hari, cukup untuk review

# JOB 2: Stage 2, 3, 4 — Training + Evaluation + Auto-Registry

  stage-2-3-4-train-evaluate-register:
    name: "Stage 2/3/4 — Train → Evaluate → Register"
    runs-on: ubuntu-latest
    needs: stage-1-testing 

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-ci.txt"

      - name: "📦 Install CI dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      # Step: Verifikasi data tersedia
      - name: "🗂️ Verifikasi data tersedia"
        run: |
          echo "=== Mengecek ketersediaan data ==="
          if [ -f "data/processed/features.parquet" ]; then
            python -c "
          import pandas as pd
          df = pd.read_parquet('data/processed/features.parquet')
          print(f'features.parquet: {len(df)} baris, {len(df.columns)} kolom')
          print(f'Kolom: {list(df.columns)}')
          "
          else
            echo "ERROR: features.parquet tidak ditemukan!"
            echo "Pastikan file ini di-commit ke repository."
            exit 1
          fi

      # STAGE 2: Automated Training
      - name: "🚂 Stage 2 — Automated Training (train.py)"
        run: |
          echo "=== STAGE 2: Automated Training ==="
          echo "Melatih 3 variasi model dengan SMOTETomek..."
          python src/train.py --variations
          echo "Training selesai. Metrik tersimpan di mlruns/"
        env:
          PYTHONWARNINGS: "ignore::FutureWarning"

      # STAGE 3 + 4: Evaluation & Auto-Registry
      - name: "📊 Stage 3+4 — Evaluate & Auto-Register"
        run: |
          echo "=== STAGE 3: Evaluasi Metrik ==="
          echo "Threshold dari config/params.yaml:"
          python -c "
          import yaml
          p = yaml.safe_load(open('config/params.yaml'))['ci_thresholds']
          print(f'  pr_auc  >= {p[\"pr_auc_min\"]}')
          print(f'  f1      >= {p[\"f1_min\"]}')
          print(f'  recall  >= {p[\"recall_min\"]}')
          "
          echo ""
          python src/ci_evaluate.py
        env:
          PYTHONWARNINGS: "ignore::FutureWarning"

      # Upload laporan evaluasi sebagai artifact
      - name: "📤 Upload laporan evaluasi"
        uses: actions/upload-artifact@v4
        if: always()   # upload meski evaluasi gagal
        with:
          name: evaluation-report
          path: |
            logs/ci_evaluation_report.md
            logs/train.log
            logs/report_*.txt
          retention-days: 30

      # Upload MLflow runs sebagai artifact
      # Berguna untuk analisis offline atau debugging
      - name: "📤 Upload MLflow runs"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 7

      # Tampilkan isi laporan evaluasi langsung di log GitHub Actions
      - name: "📋 Tampilkan laporan evaluasi"
        if: always()
        run: |
          if [ -f "logs/ci_evaluation_report.md" ]; then
            echo "=== ISI LAPORAN EVALUASI ==="
            cat logs/ci_evaluation_report.md
          fi

      - name: "📝 Tulis ke GitHub Actions Summary"
        if: always()
        run: |
          if [ -f "logs/ci_evaluation_report.md" ]; then
            cat logs/ci_evaluation_report.md >> $GITHUB_STEP_SUMMARY
          fi