# =============================================================================
# GempaWas — Parameter konfigurasi terpusat
# Semua threshold, hyperparameter, dan konstanta yang sering di-tune disimpan
# di sini supaya kode tetap bersih dan reproducibility tinggi.
# =============================================================================

# ---------------------------------------------------------------------------
# Wilayah Indonesia (bounding box)
# ---------------------------------------------------------------------------
indonesia_bbox:
  min_lat: -11.0
  max_lat: 6.0
  min_lon: 95.0
  max_lon: 141.0

# ---------------------------------------------------------------------------
# Definisi gempa & susulan
# ---------------------------------------------------------------------------
seismic:
  mainshock_threshold: 5.0        # M >= 5.0 dianggap mainshock
  aftershock_threshold: 4.0       # M >= 4.0 dianggap susulan signifikan
  spatial_radius_km: 100          # radius pencarian susulan dari mainshock
  prediction_window_hours: 24     # prediksi probabilitas untuk 24 jam ke depan
  mainshock_isolation_days: 7     # mainshock harus tidak didahului M>=5 dalam 7 hari

# ---------------------------------------------------------------------------
# Omori's Law constants (default; bisa di-fit per zona)
# ---------------------------------------------------------------------------
omori:
  K: 10.0
  c: 0.1
  p: 1.0

# ---------------------------------------------------------------------------
# Snapshot times (jam setelah mainshock) untuk training samples
# ---------------------------------------------------------------------------
snapshot_hours: [1, 3, 6, 12, 24, 48, 72]

# ---------------------------------------------------------------------------
# Ingestion
# ---------------------------------------------------------------------------
ingestion:
  min_magnitude: 2.5
  default_hours_back: 2
  request_timeout_seconds: 30

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  test_year: 2025                # data dari tahun ini ke atas = test set
  random_state: 42
  cv_folds: 3
  scoring: "average_precision"

  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    class_weight: "balanced"

  xgboost:
    tune: true
    eval_metric: "aucpr"
    param_grid:
      n_estimators: [100, 200]
      max_depth: [4, 6, 8]
      learning_rate: [0.05, 0.1]
    default:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.1

# ---------------------------------------------------------------------------
# Monitoring / Drift
# ---------------------------------------------------------------------------
monitoring:
  psi_threshold: 0.1              # PSI >= 0.1 -> warning, perlu retraining
  psi_critical: 0.25              # PSI >= 0.25 -> critical
  f1_degradation_threshold: 0.10  # turun >10% dari baseline -> retraining
  drift_window_days: 7
  reference_window_days: 30
  monitored_features:
    - magnitude
    - depth_km
    - latitude
    - longitude

# ---------------------------------------------------------------------------
# Model promotion
# ---------------------------------------------------------------------------
promotion:
  champion_metric: "pr_auc"
  min_improvement: 0.02           # challenger harus >= +2% PR-AUC
  model_name: "gempawas-production"

# ---------------------------------------------------------------------------
# Serving
# ---------------------------------------------------------------------------
serving:
  risk_thresholds:
    tinggi: 0.7
    sedang: 0.4
    # rendah = di bawah sedang
