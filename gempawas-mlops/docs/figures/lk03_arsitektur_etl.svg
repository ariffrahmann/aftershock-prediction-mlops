<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1380" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="1380" fill="#fafbfc"/>

  <!-- Title -->
  <text x="550" y="36" font-size="22" font-weight="700" text-anchor="middle" fill="#1f2937">GempaWas — Arsitektur Pipeline ETL &amp; Continual Training</text>
  <text x="550" y="60" font-size="13" text-anchor="middle" fill="#6b7280">LK-03 • Data Ingestion → Feature Engineering → Training → Serving</text>

  <!-- ============ LAYER 1: EXTERNAL SOURCES ============ -->
  <rect x="40" y="90" width="1020" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="115" font-size="14" font-weight="700" fill="#92400e">1. EXTERNAL DATA SOURCES (streaming, public APIs)</text>

  <!-- USGS box -->
  <rect x="100" y="130" width="280" height="65" rx="6" fill="#fff" stroke="#d97706" stroke-width="2"/>
  <text x="240" y="153" font-size="14" font-weight="700" text-anchor="middle" fill="#92400e">USGS Earthquake API</text>
  <text x="240" y="172" font-size="11" text-anchor="middle" fill="#374151">earthquake.usgs.gov/fdsnws/event/1/query</text>
  <text x="240" y="188" font-size="11" text-anchor="middle" fill="#6b7280">GeoJSON • global coverage • public domain</text>

  <!-- BMKG box -->
  <rect x="720" y="130" width="280" height="65" rx="6" fill="#fff" stroke="#d97706" stroke-width="2"/>
  <text x="860" y="153" font-size="14" font-weight="700" text-anchor="middle" fill="#92400e">BMKG Open API</text>
  <text x="860" y="172" font-size="11" text-anchor="middle" fill="#374151">data.bmkg.go.id/DataMKG/TEWS/*.json</text>
  <text x="860" y="188" font-size="11" text-anchor="middle" fill="#6b7280">JSON • fokus Indonesia • intensitas dirasakan</text>

  <!-- ============ LAYER 2: INGESTION ============ -->
  <rect x="40" y="240" width="1020" height="150" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="60" y="265" font-size="14" font-weight="700" fill="#1e40af">2. INGESTION — GitHub Actions cron (hourly, minute 5)</text>

  <!-- Cron trigger -->
  <rect x="80" y="285" width="200" height="85" rx="6" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180" y="307" font-size="13" font-weight="700" text-anchor="middle" fill="#1e40af">GitHub Actions</text>
  <text x="180" y="324" font-size="11" text-anchor="middle" fill="#374151">scheduled_ingestion.yml</text>
  <text x="180" y="340" font-size="11" text-anchor="middle" fill="#6b7280">cron: '5 * * * *'</text>
  <text x="180" y="356" font-size="11" text-anchor="middle" fill="#6b7280">workflow_dispatch</text>

  <!-- ingestion.py -->
  <rect x="320" y="285" width="240" height="85" rx="6" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="440" y="307" font-size="13" font-weight="700" text-anchor="middle" fill="#1e40af">src/ingestion.py</text>
  <text x="440" y="324" font-size="11" text-anchor="middle" fill="#374151">fetch_usgs() + fetch_bmkg()</text>
  <text x="440" y="340" font-size="11" text-anchor="middle" fill="#374151">normalize schema → dedup</text>
  <text x="440" y="356" font-size="11" text-anchor="middle" fill="#6b7280">idempotent (INSERT OR IGNORE)</text>

  <!-- preprocess.py -->
  <rect x="600" y="285" width="240" height="85" rx="6" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="720" y="307" font-size="13" font-weight="700" text-anchor="middle" fill="#1e40af">src/preprocess.py</text>
  <text x="720" y="324" font-size="11" text-anchor="middle" fill="#374151">parse datetime, fill NA, dedup</text>
  <text x="720" y="340" font-size="11" text-anchor="middle" fill="#374151">outlier removal, type cast</text>
  <text x="720" y="356" font-size="11" text-anchor="middle" fill="#6b7280">LK-04 deliverable</text>

  <!-- Quick drift check -->
  <rect x="880" y="285" width="160" height="85" rx="6" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="960" y="307" font-size="13" font-weight="700" text-anchor="middle" fill="#1e40af">Drift Quick Check</text>
  <text x="960" y="324" font-size="11" text-anchor="middle" fill="#374151">src/monitor.py</text>
  <text x="960" y="340" font-size="11" text-anchor="middle" fill="#374151">PSI (magnitude)</text>
  <text x="960" y="356" font-size="11" text-anchor="middle" fill="#6b7280">flag if ≥ 0.1</text>

  <!-- ============ LAYER 3: STORAGE ============ -->
  <rect x="40" y="420" width="1020" height="170" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="60" y="445" font-size="14" font-weight="700" fill="#166534">3. DATA STORAGE — versioned with DVC (LK-05)</text>

  <!-- data/raw -->
  <rect x="80" y="465" width="220" height="100" rx="6" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="190" y="487" font-size="13" font-weight="700" text-anchor="middle" fill="#166534">data/raw/</text>
  <text x="190" y="505" font-size="11" text-anchor="middle" fill="#374151">JSON snapshot per ingest</text>
  <text x="190" y="521" font-size="11" text-anchor="middle" fill="#374151">usgs_YYYY-MM-DDTHH-MM-SSZ.json</text>
  <text x="190" y="537" font-size="11" text-anchor="middle" fill="#6b7280">append-only</text>
  <text x="190" y="555" font-size="10" font-weight="700" text-anchor="middle" fill="#15803d">[DVC tracked]</text>

  <!-- data/gempa.db -->
  <rect x="320" y="465" width="220" height="100" rx="6" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="430" y="487" font-size="13" font-weight="700" text-anchor="middle" fill="#166534">data/gempa.db</text>
  <text x="430" y="505" font-size="11" text-anchor="middle" fill="#374151">SQLite operational store</text>
  <text x="430" y="521" font-size="11" text-anchor="middle" fill="#374151">table: events (PK: event_id)</text>
  <text x="430" y="537" font-size="11" text-anchor="middle" fill="#6b7280">idx: time_utc, magnitude</text>
  <text x="430" y="555" font-size="10" font-weight="700" text-anchor="middle" fill="#15803d">[DVC tracked]</text>

  <!-- data/interim -->
  <rect x="560" y="465" width="220" height="100" rx="6" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="670" y="487" font-size="13" font-weight="700" text-anchor="middle" fill="#166534">data/interim/</text>
  <text x="670" y="505" font-size="11" text-anchor="middle" fill="#374151">events_clean.parquet</text>
  <text x="670" y="521" font-size="11" text-anchor="middle" fill="#374151">setelah cleaning, sebelum FE</text>
  <text x="670" y="537" font-size="11" text-anchor="middle" fill="#6b7280">regen-able</text>
  <text x="670" y="555" font-size="10" font-weight="700" text-anchor="middle" fill="#15803d">[DVC tracked]</text>

  <!-- data/processed -->
  <rect x="800" y="465" width="220" height="100" rx="6" fill="#fff" stroke="#15803d" stroke-width="2"/>
  <text x="910" y="487" font-size="13" font-weight="700" text-anchor="middle" fill="#166534">data/processed/</text>
  <text x="910" y="505" font-size="11" text-anchor="middle" fill="#374151">features.parquet</text>
  <text x="910" y="521" font-size="11" text-anchor="middle" fill="#374151">10 fitur + 1 label</text>
  <text x="910" y="537" font-size="11" text-anchor="middle" fill="#6b7280">siap training</text>
  <text x="910" y="555" font-size="10" font-weight="700" text-anchor="middle" fill="#15803d">[DVC tagged versions]</text>

  <!-- ============ LAYER 4: FEATURE ENGINEERING ============ -->
  <rect x="40" y="620" width="1020" height="130" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="60" y="645" font-size="14" font-weight="700" fill="#5b21b6">4. FEATURE ENGINEERING — src/features.py</text>

  <rect x="80" y="665" width="300" height="70" rx="6" fill="#fff" stroke="#6d28d9" stroke-width="2"/>
  <text x="230" y="687" font-size="13" font-weight="700" text-anchor="middle" fill="#5b21b6">Identifikasi mainshock</text>
  <text x="230" y="704" font-size="11" text-anchor="middle" fill="#374151">M ≥ 5.0, isolated 7 hari/100 km</text>
  <text x="230" y="720" font-size="11" text-anchor="middle" fill="#6b7280">find_mainshocks()</text>

  <rect x="400" y="665" width="300" height="70" rx="6" fill="#fff" stroke="#6d28d9" stroke-width="2"/>
  <text x="550" y="687" font-size="13" font-weight="700" text-anchor="middle" fill="#5b21b6">Snapshot rolling features</text>
  <text x="550" y="704" font-size="11" text-anchor="middle" fill="#374151">count/max_mag 1, 6, 24 jam</text>
  <text x="550" y="720" font-size="11" text-anchor="middle" fill="#6b7280">omori_rate, zona_sesar encode</text>

  <rect x="720" y="665" width="300" height="70" rx="6" fill="#fff" stroke="#6d28d9" stroke-width="2"/>
  <text x="870" y="687" font-size="13" font-weight="700" text-anchor="middle" fill="#5b21b6">Compute label</text>
  <text x="870" y="704" font-size="11" text-anchor="middle" fill="#374151">susulan ≥ M4 dalam 24 jam ke depan</text>
  <text x="870" y="720" font-size="11" text-anchor="middle" fill="#6b7280">no data leakage</text>

  <!-- ============ LAYER 5: TRAINING ============ -->
  <rect x="40" y="780" width="1020" height="140" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="60" y="805" font-size="14" font-weight="700" fill="#991b1b">5. TRAINING — XGBoost + MLflow (weekly + drift-triggered)</text>

  <rect x="80" y="825" width="240" height="80" rx="6" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="200" y="847" font-size="13" font-weight="700" text-anchor="middle" fill="#991b1b">GitHub Actions</text>
  <text x="200" y="864" font-size="11" text-anchor="middle" fill="#374151">weekly_retrain.yml</text>
  <text x="200" y="880" font-size="11" text-anchor="middle" fill="#374151">cron: '0 3 * * 1'</text>
  <text x="200" y="896" font-size="11" text-anchor="middle" fill="#6b7280">+ on-demand drift trigger</text>

  <rect x="340" y="825" width="240" height="80" rx="6" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="460" y="847" font-size="13" font-weight="700" text-anchor="middle" fill="#991b1b">src/train.py (XGBoost)</text>
  <text x="460" y="864" font-size="11" text-anchor="middle" fill="#374151">time-based split</text>
  <text x="460" y="880" font-size="11" text-anchor="middle" fill="#374151">scale_pos_weight, GridSearch</text>
  <text x="460" y="896" font-size="11" text-anchor="middle" fill="#6b7280">F1, PR-AUC, ROC-AUC</text>

  <rect x="600" y="825" width="200" height="80" rx="6" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="700" y="847" font-size="13" font-weight="700" text-anchor="middle" fill="#991b1b">MLflow Tracking</text>
  <text x="700" y="864" font-size="11" text-anchor="middle" fill="#374151">log_param, log_metric</text>
  <text x="700" y="880" font-size="11" text-anchor="middle" fill="#374151">log_model, artifacts</text>
  <text x="700" y="896" font-size="11" text-anchor="middle" fill="#6b7280">file:./mlruns</text>

  <rect x="820" y="825" width="220" height="80" rx="6" fill="#fff" stroke="#b91c1c" stroke-width="2"/>
  <text x="930" y="847" font-size="13" font-weight="700" text-anchor="middle" fill="#991b1b">Model Registry</text>
  <text x="930" y="864" font-size="11" text-anchor="middle" fill="#374151">None → Staging → Production</text>
  <text x="930" y="880" font-size="11" text-anchor="middle" fill="#374151">promote if PR-AUC +2%</text>
  <text x="930" y="896" font-size="11" text-anchor="middle" fill="#6b7280">rollback otomatis</text>

  <!-- ============ LAYER 6: SERVING ============ -->
  <rect x="40" y="950" width="1020" height="140" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="60" y="975" font-size="14" font-weight="700" fill="#155e75">6. SERVING — production inference</text>

  <rect x="100" y="995" width="280" height="80" rx="6" fill="#fff" stroke="#0e7490" stroke-width="2"/>
  <text x="240" y="1017" font-size="13" font-weight="700" text-anchor="middle" fill="#155e75">FastAPI</text>
  <text x="240" y="1034" font-size="11" text-anchor="middle" fill="#374151">src/inference.py — port 8000</text>
  <text x="240" y="1050" font-size="11" text-anchor="middle" fill="#374151">POST /predict, GET /health</text>
  <text x="240" y="1066" font-size="11" text-anchor="middle" fill="#6b7280">latency &lt; 200ms</text>

  <rect x="400" y="995" width="280" height="80" rx="6" fill="#fff" stroke="#0e7490" stroke-width="2"/>
  <text x="540" y="1017" font-size="13" font-weight="700" text-anchor="middle" fill="#155e75">Streamlit Dashboard</text>
  <text x="540" y="1034" font-size="11" text-anchor="middle" fill="#374151">port 8501 — untuk BPBD</text>
  <text x="540" y="1050" font-size="11" text-anchor="middle" fill="#374151">peta zona + tabel risiko</text>
  <text x="540" y="1066" font-size="11" text-anchor="middle" fill="#6b7280">(LK lanjutan)</text>

  <rect x="700" y="995" width="280" height="80" rx="6" fill="#fff" stroke="#0e7490" stroke-width="2"/>
  <text x="840" y="1017" font-size="13" font-weight="700" text-anchor="middle" fill="#155e75">Docker container</text>
  <text x="840" y="1034" font-size="11" text-anchor="middle" fill="#374151">multi-stage build</text>
  <text x="840" y="1050" font-size="11" text-anchor="middle" fill="#374151">FastAPI + model artifact</text>
  <text x="840" y="1066" font-size="11" text-anchor="middle" fill="#6b7280">deploy-ready</text>

  <!-- ============ LAYER 7: USERS ============ -->
  <rect x="40" y="1120" width="1020" height="110" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  <text x="60" y="1145" font-size="14" font-weight="700" fill="#1f2937">7. END USERS</text>

  <rect x="80" y="1165" width="180" height="50" rx="6" fill="#fff" stroke="#4b5563"/>
  <text x="170" y="1184" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2937">BPBD Provinsi</text>
  <text x="170" y="1200" font-size="11" text-anchor="middle" fill="#6b7280">prioritas SAR &amp; evakuasi</text>

  <rect x="280" y="1165" width="180" height="50" rx="6" fill="#fff" stroke="#4b5563"/>
  <text x="370" y="1184" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2937">BNPB</text>
  <text x="370" y="1200" font-size="11" text-anchor="middle" fill="#6b7280">early warning nasional</text>

  <rect x="480" y="1165" width="180" height="50" rx="6" fill="#fff" stroke="#4b5563"/>
  <text x="570" y="1184" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2937">Media massa</text>
  <text x="570" y="1200" font-size="11" text-anchor="middle" fill="#6b7280">pemberitaan terverifikasi</text>

  <rect x="680" y="1165" width="180" height="50" rx="6" fill="#fff" stroke="#4b5563"/>
  <text x="770" y="1184" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2937">App warga</text>
  <text x="770" y="1200" font-size="11" text-anchor="middle" fill="#6b7280">push notification</text>

  <rect x="880" y="1165" width="160" height="50" rx="6" fill="#fff" stroke="#4b5563"/>
  <text x="960" y="1184" font-size="12" font-weight="700" text-anchor="middle" fill="#1f2937">Asuransi</text>
  <text x="960" y="1200" font-size="11" text-anchor="middle" fill="#6b7280">risk claim assess.</text>

  <!-- ============ ARROWS antar layer ============ -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- L1 -> L2 -->
  <line x1="240" y1="195" x2="240" y2="240" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="860" y1="195" x2="860" y2="240" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- L2 -> L3 -->
  <line x1="440" y1="370" x2="440" y2="420" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="370" x2="190" y2="465" stroke="#374151" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="720" y1="370" x2="670" y2="465" stroke="#374151" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="3,2"/>

  <!-- L3 -> L4 (storage to FE) -->
  <line x1="910" y1="565" x2="550" y2="665" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="565" x2="550" y2="665" stroke="#374151" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="3,2"/>

  <!-- L4 -> L3 (output ke processed/) -->
  <line x1="870" y1="665" x2="910" y2="565" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="980" y="630" font-size="10" fill="#15803d">write</text>

  <!-- L4 -> L5 -->
  <line x1="550" y1="735" x2="460" y2="825" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- L5 -> L6 -->
  <line x1="930" y1="905" x2="540" y2="995" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="930" y1="905" x2="840" y2="995" stroke="#374151" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="930" y1="905" x2="240" y2="995" stroke="#374151" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="3,2"/>

  <!-- L6 -> L7 -->
  <line x1="540" y1="1075" x2="540" y2="1165" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Drift feedback loop (L2 monitor -> L5 trigger) -->
  <path d="M 1020 327 Q 1075 600 1075 880 Q 1075 870 1060 865" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="1078" y="600" font-size="10" font-weight="700" fill="#991b1b" transform="rotate(90,1078,600)">drift &gt; 0.1 → retrain</text>

  <!-- Bottom note -->
  <text x="550" y="1268" font-size="11" text-anchor="middle" fill="#6b7280">⟶ solid = data flow utama   ⟶ dashed = pemicu/feedback   [DVC tracked] = di-version oleh DVC, bukan Git</text>
  <text x="550" y="1284" font-size="11" text-anchor="middle" fill="#6b7280">Continual Learning loop: hourly ingest → weekly retrain + drift-triggered retrain → registry promote</text>

  <!-- Legend boxes -->
  <text x="60" y="1320" font-size="11" font-weight="700" fill="#1f2937">Legend (warna per layer):</text>
  <rect x="195" y="1310" width="14" height="14" fill="#fef3c7" stroke="#f59e0b"/><text x="215" y="1322" font-size="11" fill="#374151">Source</text>
  <rect x="270" y="1310" width="14" height="14" fill="#dbeafe" stroke="#3b82f6"/><text x="290" y="1322" font-size="11" fill="#374151">Ingestion</text>
  <rect x="360" y="1310" width="14" height="14" fill="#dcfce7" stroke="#16a34a"/><text x="380" y="1322" font-size="11" fill="#374151">Storage</text>
  <rect x="440" y="1310" width="14" height="14" fill="#ede9fe" stroke="#7c3aed"/><text x="460" y="1322" font-size="11" fill="#374151">Feature Eng</text>
  <rect x="540" y="1310" width="14" height="14" fill="#fee2e2" stroke="#dc2626"/><text x="560" y="1322" font-size="11" fill="#374151">Training</text>
  <rect x="620" y="1310" width="14" height="14" fill="#cffafe" stroke="#0891b2"/><text x="640" y="1322" font-size="11" fill="#374151">Serving</text>
  <rect x="690" y="1310" width="14" height="14" fill="#f3f4f6" stroke="#374151"/><text x="710" y="1322" font-size="11" fill="#374151">Users</text>

  <text x="1040" y="1356" font-size="10" text-anchor="end" fill="#9ca3af">GempaWas v0.1 • 2026</text>
</svg>
